<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" data-diagram-type="CLASS" style="width:790px;height:523px;background:#FFFFFF;" width="790px" height="523px" viewBox="0 0 790 523" zoomAndPan="magnify" preserveAspectRatio="none" contentStyleType="text/css"><?plantuml 1.2026.7beta8?><defs/><g font-family="sans-serif" lengthAdjust="spacing"><g class="legend" data-source-line="1"><rect x="12" y="22" width="759.376" height="482.609" fill="#DDD" style="stroke:#000;stroke-width:1;" rx="7.5" ry="7.5"/><text x="17" y="39.995" fill="#000" font-size="14" textLength="399.301">The plugin you are using seems to generated a bad URL.</text><text x="17" y="56.292" fill="#000" font-size="14" textLength="295.887">This URL does not look like DEFLATE data.</text><text x="17" y="72.589" fill="#000" font-size="14" textLength="367.664">It looks like your plugin is using HUFFMAN encoding.</text><text x="17" y="88.886" fill="#000" font-size="14"> </text><text x="17" y="105.183" fill="#000" font-size="14" textLength="671.706">This means you have now to add an header ~1 to your data. For example, you have to change:</text><text x="17" y="121.479" fill="#000" font-size="14" textLength="549.131">http://www.plantuml.com/plantuml/png/eJxtVV1P2lAYvu-vOGEXuyKRDz-4MR...</text><text x="17" y="137.776" fill="#000" font-size="14" textLength="14.055">to</text><text x="17" y="154.073" fill="#000" font-size="14" textLength="569.769">http://www.plantuml.com/plantuml/png/~1eJxtVV1P2lAYvu-vOGEXuyKRDz-4MR...</text><text x="17" y="170.37" fill="#000" font-size="14"> </text><text x="17" y="186.667" fill="#000" font-size="14" textLength="138.277">It will work this way</text><text x="17" y="202.964" fill="#000" font-size="14" textLength="428.148">You may contact the PlantUML team at plantuml@gmail.com</text><text x="17" y="219.261" fill="#000" font-size="14" textLength="749.376">But you should also probably contact the plugin authors you are currently using and send them this image</text><text x="17" y="235.558" fill="#000" font-size="14"> </text><text x="17" y="251.854" fill="#000" font-size="14" textLength="232.545">For the record, here is your data:</text><text x="17" y="268.151" fill="#000" font-size="14"> </text><text x="17" y="284.448" fill="#000" font-size="14" textLength="697.184">eJxtVV1P2lAYvu-vOGEXuyKRDz-4MRqdyZJlWzRejV1UOEJjaUkpZm4zwYmITqNmfg42RMUxl0EWF1Gq</text><text x="17" y="300.745" fill="#000" font-size="14" textLength="694.388">MeGnLPS0_Rd721I8NpBA34_ned73nPOeMpKSWUlOJ3gmNccJSVZiE2iGjczFJDEtRMdEXpTQkwnrQyGi</text><text x="17" y="317.042" fill="#000" font-size="14" textLength="675.247">eJZN8_KEKMgv2QRGoxLH8r3zU9x7jHxBhsezMpJFJHGxuIyinIQjMicKFCkJZdkYnpIXeIzMNCvEeMww</text><text x="17" y="333.339" fill="#000" font-size="14" textLength="671.925">bESGJjzqzqHaqHgQm0LPEslutFYmazftZtNKjCa7Ca1W1rZzQLIT0QTDwA_yfhy2UEy3APJMYi4xgzEi</text><text x="17" y="349.636" fill="#000" font-size="14" textLength="690.43">R019-Y6sV4zdjHapaErJgz4wDIK2Y1iOYwk8BJ90CkfYFBC1I0W92yOXVTW3YZdJy3HmMaZ9vd6-PdYq</text><text x="17" y="365.933" fill="#000" font-size="14" textLength="687.36">VbJZCwuvxib1ek7N_7Lg02O-x2A1X1CVpt2BurnXAfkfg8jWdrt51gWFhX9b10Yxo5Vreu2sQwm4dLf2</text><text x="17" y="382.229" fill="#000" font-size="14" textLength="680.278">yVXerRt06Z5mSKlinGS12kEH0e9a726J5Ldfj0-EBXVrx8gsGZ9qbeWqAx5wrRzEtOJnu2j7vkyW6kDL</text><text x="17" y="398.526" fill="#000" font-size="14" textLength="700.595">H-jlaquh18_J8go87wtq87wjMOiqZu0Z-bNKMkpYIMU1spcnxRI5LhsXGx3KkKumPQ7qWRbOHjhWB62G</text><text x="17" y="414.823" fill="#000" font-size="14" textLength="660.153">kfmq36_C8-elWvjeoYZcVE3Jasqq06ixXDUOoFF7O1qNtnIBjWuFQ-fg-lyFrem0h86B-NwVrJkyVja1</text><text x="17" y="431.12" fill="#000" font-size="14" textLength="684.373">u9pDBZvpVBqbnB53-H734rbz-o8sLEqvn8Didu-13_twaNrfE1Cxc9YROnzXEGgmMac2v9hdgsL-Kimf</text><text x="17" y="447.417" fill="#000" font-size="14" textLength="697.416">thogoN46QwFX9TFt9DlS6zd6_ZsDMIdikVlkmKfmReTFBYwZMJDXO2xfAMcxx_vB9lN2gLKDlN1