<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" data-diagram-type="CLASS" style="width:790px;height:409px;background:#FFFFFF;" width="790px" height="409px" viewBox="0 0 790 409" zoomAndPan="magnify" preserveAspectRatio="none" contentStyleType="text/css"><?plantuml 1.2026.7beta8?><defs/><g font-family="sans-serif" lengthAdjust="spacing"><g class="legend" data-source-line="1"><rect x="12" y="22" width="759.376" height="368.531" fill="#DDD" style="stroke:#000;stroke-width:1;" rx="7.5" ry="7.5"/><text x="17" y="39.995" fill="#000" font-size="14" textLength="399.301">The plugin you are using seems to generated a bad URL.</text><text x="17" y="56.292" fill="#000" font-size="14" textLength="295.887">This URL does not look like DEFLATE data.</text><text x="17" y="72.589" fill="#000" font-size="14" textLength="367.664">It looks like your plugin is using HUFFMAN encoding.</text><text x="17" y="88.886" fill="#000" font-size="14"> </text><text x="17" y="105.183" fill="#000" font-size="14" textLength="671.706">This means you have now to add an header ~1 to your data. For example, you have to change:</text><text x="17" y="121.479" fill="#000" font-size="14" textLength="553.451">http://www.plantuml.com/plantuml/png/eJxtk01LAkEYgO_zKwa71EFoNb8uUV...</text><text x="17" y="137.776" fill="#000" font-size="14" textLength="14.055">to</text><text x="17" y="154.073" fill="#000" font-size="14" textLength="574.089">http://www.plantuml.com/plantuml/png/~1eJxtk01LAkEYgO_zKwa71EFoNb8uUV...</text><text x="17" y="170.37" fill="#000" font-size="14"> </text><text x="17" y="186.667" fill="#000" font-size="14" textLength="138.277">It will work this way</text><text x="17" y="202.964" fill="#000" font-size="14" textLength="428.148">You may contact the PlantUML team at plantuml@gmail.com</text><text x="17" y="219.261" fill="#000" font-size="14" textLength="749.376">But you should also probably contact the plugin authors you are currently using and send them this image</text><text x="17" y="235.558" fill="#000" font-size="14"> </text><text x="17" y="251.854" fill="#000" font-size="14" textLength="232.545">For the record, here is your data:</text><text x="17" y="268.151" fill="#000" font-size="14"> </text><text x="17" y="284.448" fill="#000" font-size="14" textLength="684.934">eJxtk01LAkEYgO_zKwa71EFoNb8uUVgdOxTeuky7oy3th-yOlz4gSMzoYlQqVMgakgTZISHSwD_T7tq_</text><text x="17" y="300.745" fill="#000" font-size="14" textLength="704.457">aNaJnQl3D8PDvM_7wcvsmk2QRSq6BuxD1SgjC-lwH8mHJcusGEre1EwLLmzNPsFQcBFVNLJlGmQb6Riu</text><text x="17" y="317.042" fill="#000" font-size="14" textLength="716.898">WyrSouO76hGGUhJouEggMaGllg4IVFQLy0Q1DQCQTGiPmHvddj96MYhsuKmXw9uB411-fo9Gs8B6OQz4</text><text x="17" y="333.339" fill="#000" font-size="14" textLength="712.373">A8dv1GgSCyg6APSA8ZPVmQWC8sgoaZiq72N_3GEJMXgMIKzYWEY2hovs8ue8_9Pq7xn5ncLGUlCuIM1L</text><text x="17" y="349.636" fill="#000" font-size="14" textLength="670.476">bD5RSkRU6lb9QUuUkqLkdXr-wxVr59ZbU6fPpJUIaVaJgvc4YVJqXvoev9Aa_n2bGel5g00t9sqA0__b</text><text x="17" y="365.933" fill="#000" font-size="14" textLength="666.736">6fSmbzV3dBO5IO_pzB92vduJ_9pk-Vkx7Dbq0-cqlWg3Fs7NL4Vle80Lz3n6W-_yP2vYdb_uIiwpGJU-</text><text x="17" y="382.229" fill="#000" font-size="14" textLength="673.47">BhiPrwZLCjHFMc0xyzFHX0M5zAsxxTHNMcMxyzH396ACljgmOCYFYVlgCYA1bCjBP_ULeNZRFw==</text></g><?plantuml-src ZLJRageu57tdA_81nmjUKBhgL0rUG6bGKA4RNwW0wO04eeI0y72-VL2dvzIypCnBAjcNjTQ-L0Z2A8-4Kup0bN2SvA2X7C020SwI70E6KCP0IK4NXWfOeWX04C08E0UZtwKbx7434KKCvBG4XD8Ka2H5OBLM3UMq1X4iOL_OlbpivUiuYc--3k55jN5KrLHs0EKXZJf3NtZXPmZcx2ahXXNgMEg77XXrId8G8nYX0lmI7xOdx9CFgBG0w0wpAq4_VkTsCM4CSupUXBWihs-3GLtN_Ik1USapqWzfDlX-3Auv7Y3zNgP3qL3IjOVtVljUmvcuLkakc7F7xVVxGad_7z8lyR-n7asg4q90JOiKb8_QQzW8NgS-Wmq8QLx2iEmS25WFRCSqG8bW1c09lid-m1bCdlp2WfVFobbCEUcQHHW5ru86C23_1Fjh492NCItOtmiGyg90UTa5l-O3ywXRX-xeShANl2I360d2ezaFe0A5j8X-T4FfqXFsUnvlWl3lvUDeVpyXdZOpsepBkDViIJl1HxEb7h5lhebXYa_dxN5ph5V-QLRUV07ke9xRPBoQMwlAz6TrMB4i7Tc7uqrQyFjAFEBBiaVgpJp