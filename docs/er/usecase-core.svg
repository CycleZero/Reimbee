<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" data-diagram-type="CLASS" style="width:790px;height:474px;background:#FFFFFF;" width="790px" height="474px" viewBox="0 0 790 474" zoomAndPan="magnify" preserveAspectRatio="none" contentStyleType="text/css"><?plantuml 1.2026.7beta8?><defs/><g font-family="sans-serif" lengthAdjust="spacing"><g class="legend" data-source-line="1"><rect x="12" y="22" width="759.376" height="433.719" fill="#DDD" style="stroke:#000;stroke-width:1;" rx="7.5" ry="7.5"/><text x="17" y="39.995" fill="#000" font-size="14" textLength="399.301">The plugin you are using seems to generated a bad URL.</text><text x="17" y="56.292" fill="#000" font-size="14" textLength="295.887">This URL does not look like DEFLATE data.</text><text x="17" y="72.589" fill="#000" font-size="14" textLength="367.664">It looks like your plugin is using HUFFMAN encoding.</text><text x="17" y="88.886" fill="#000" font-size="14"> </text><text x="17" y="105.183" fill="#000" font-size="14" textLength="671.706">This means you have now to add an header ~1 to your data. For example, you have to change:</text><text x="17" y="121.479" fill="#000" font-size="14" textLength="537.072">http://www.plantuml.com/plantuml/png/eJx1lF1v0lAYx-_7KU7wRi9IVt65WU...</text><text x="17" y="137.776" fill="#000" font-size="14" textLength="14.055">to</text><text x="17" y="154.073" fill="#000" font-size="14" textLength="557.71">http://www.plantuml.com/plantuml/png/~1eJx1lF1v0lAYx-_7KU7wRi9IVt65WU...</text><text x="17" y="170.37" fill="#000" font-size="14"> </text><text x="17" y="186.667" fill="#000" font-size="14" textLength="138.277">It will work this way</text><text x="17" y="202.964" fill="#000" font-size="14" textLength="428.148">You may contact the PlantUML team at plantuml@gmail.com</text><text x="17" y="219.261" fill="#000" font-size="14" textLength="749.376">But you should also probably contact the plugin authors you are currently using and send them this image</text><text x="17" y="235.558" fill="#000" font-size="14"> </text><text x="17" y="251.854" fill="#000" font-size="14" textLength="232.545">For the record, here is your data:</text><text x="17" y="268.151" fill="#000" font-size="14"> </text><text x="17" y="284.448" fill="#000" font-size="14" textLength="667.393">eJx1lF1v0lAYx-_7KU7wRi9IVt65WUZUEhNjDGZ3u6nQYbPSklJufEk6dYzNISxuTgfK0LGgFyW6uBfY</text><text x="17" y="300.745" fill="#000" font-size="14" textLength="710.124">3Hcx7Wn7LTz0dO05iFyQX87_eZ7_c56n7UJF5RS1WhKZyooglTmFK4HHXH6lqMhVqXBbFmUF3Mi6PyKi</text><text x="17" y="317.042" fill="#000" font-size="14" textLength="725.491">wC9zVVHNypL6gCvxIKMInDhbfyQ85QEbZUR-WQWqDBSh-EQFBUHh86ogSwzD5VXkETK3P5in_RDgKuBu</text><text x="17" y="333.339" fill="#000" font-size="14" textLength="677.776">qeyf6j24cW6MRq6QKfuCpfesVg0lYaFQYhj0B8LP590oZlKek4oiD0K2fmgPV0PgGQNAtcLnuQoPblof</text><text x="17" y="349.636" fill="#000" font-size="14" textLength="680.784">x-bl7q1J8n3yHB4PzNqWe55jXlB14Gbf2dGw8VQ142zTuDiw-gPY0N3cRZaUzXrbHI9wvtnArosRyrbZ</text><text x="17" y="365.933" fill="#000" font-size="14" textLength="670.1">MkaHfsSS9Kd55nQ0q6ej7nF8lKrYfA9P6lMVY1TFrxrs9p0vry19D8tx6v47XVhvPbyTxVqCLr7taKvO</text><text x="17" y="382.229" fill="#000" font-size="14" textLength="697.553">S90Yn2A5SVXu9q3OG8-7vmf3Bjgo9b8ge3gEX63hoPS_QXjH9lXbHB15w5ujon6sQ21MDZeaLjzoOd-3</text><text x="17" y="398.526" fill="#000" font-size="14" textLength="694.6">YGcD7tZhp-uFRKa2h11mbs9r4_cajvEK0PN2FUfbt6_WZy2HpWbvfDs225_x5T09PtVO5p45PLeHn6Za</text><text x="17" y="414.823" fill="#000" font-size="14" textLength="681.235">QaO3f51ei14utRzjYh8p5tua2fzp6dR2cFfwXcO47Hh6auKNXioQDs-jp_2acj6hp9XHSIDRAGMBxgNM</text><text x="17" y="431.12" fill="#000" font-size="14" textLength="669.683">BJgMMBVgmrCYI5jwYwlDlijIEhXRDRj0Vnv9X1POJ2TpYzpAZBkwS3CE4CjBMYLjBCcIThKM2lrgpcLk</text><text x="17" y="447.417" fill="#000" font-size="14" textLength="112.075">6_kXTZgF4Q==</text></g><?plantuml-src ZLJRageu57tdA_81HvkBW7JLgHeH4HjHG4NWnGeG