<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" data-diagram-type="CLASS" style="width:790px;height:491px;background:#FFFFFF;" width="790px" height="491px" viewBox="0 0 790 491" zoomAndPan="magnify" preserveAspectRatio="none" contentStyleType="text/css"><?plantuml 1.2026.7beta8?><defs/><g font-family="sans-serif" lengthAdjust="spacing"><g class="legend" data-source-line="1"><rect x="12" y="22" width="759.376" height="450.016" fill="#DDD" style="stroke:#000;stroke-width:1;" rx="7.5" ry="7.5"/><text x="17" y="39.995" fill="#000" font-size="14" textLength="399.301">The plugin you are using seems to generated a bad URL.</text><text x="17" y="56.292" fill="#000" font-size="14" textLength="295.887">This URL does not look like DEFLATE data.</text><text x="17" y="72.589" fill="#000" font-size="14" textLength="367.664">It looks like your plugin is using HUFFMAN encoding.</text><text x="17" y="88.886" fill="#000" font-size="14"> </text><text x="17" y="105.183" fill="#000" font-size="14" textLength="671.706">This means you have now to add an header ~1 to your data. For example, you have to change:</text><text x="17" y="121.479" fill="#000" font-size="14" textLength="556.5">http://www.plantuml.com/plantuml/png/eJydVM9PE0EUvu9fMcELkJRSQA6EEG...</text><text x="17" y="137.776" fill="#000" font-size="14" textLength="14.055">to</text><text x="17" y="154.073" fill="#000" font-size="14" textLength="577.138">http://www.plantuml.com/plantuml/png/~1eJydVM9PE0EUvu9fMcELkJRSQA6EEG...</text><text x="17" y="170.37" fill="#000" font-size="14"> </text><text x="17" y="186.667" fill="#000" font-size="14" textLength="138.277">It will work this way</text><text x="17" y="202.964" fill="#000" font-size="14" textLength="428.148">You may contact the PlantUML team at plantuml@gmail.com</text><text x="17" y="219.261" fill="#000" font-size="14" textLength="749.376">But you should also probably contact the plugin authors you are currently using and send them this image</text><text x="17" y="235.558" fill="#000" font-size="14"> </text><text x="17" y="251.854" fill="#000" font-size="14" textLength="232.545">For the record, here is your data:</text><text x="17" y="268.151" fill="#000" font-size="14"> </text><text x="17" y="284.448" fill="#000" font-size="14" textLength="748.125">eJydVM9PE0EUvu9fMcELkJRSQA6EEGopWLGFQDXemmH3sV27O7PMzDZU1gMxCgeMkgASEw7GeAQ8ED1o</text><text x="17" y="300.745" fill="#000" font-size="14" textLength="662.915">4j_jLvpf-Ha7le2PYGIP2-z73rz3fe99s_NSUaE8x9Zkw2IuFdQhG1RvmIJ7zChwmwtyZzH-pTIM2KSe</text><text x="17" y="317.042" fill="#000" font-size="14" textLength="712.243">rRY5UxXqAMkLi9qD8XXrGZDcZApMKgsGguTGNQ2YslSLDBUd1-YtABIcngZfPw0RKgmQHY2QUWIZZIbc</text><text x="17" y="333.339" fill="#000" font-size="14" textLength="677.947">Ky2VKlUyO7u6PDcXhyE5Uovxx_m1wv382vDE-EiMsojaTfguhp_ftFvltqW3FrjuORgi4dGP6_OT8GQv</text><text x="17" y="349.636" fill="#000" font-size="14" textLength="639.276">_PAxbu0at_fGKjZ0dU3a6qg6qjhDHq5UlqrFJ1UMN0FIi7M-lrC5CbqymlAzqII-GLejPIlhGif5VOh1</text><text x="17" y="365.933" fill="#000" font-size="14" textLength="684.981">_Df6hRTqHmuQNv9g_1Vw9q6tQr9dhZHor3Xjix1cj8rWLGbANuII9khM5IGzAYZhMRND5eJC6VE5BlIs</text><text x="17" y="382.229" fill="#000" font-size="14" textLength="679.711">10FGAyiDouTn9_e_Ls-Cly_C48_h64uYqHRuJyrb57s3PTndHrknQaQVxIwGWWNyYiSN9ThkeipCBbf_</text><text x="17" y="398.526" fill="#000" font-size="14" textLength="685.426">vQidYw1QYPiw7VoCN4I5nuNQ0UpbLhf3c5A7NaGmo_NVF8n4rKzRKLqQrxarpXJx4NTiAsngwi_74e5l</text><text x="17" y="414.823" fill="#000" font-size="14" textLength="721.718">e2rm_00tvWIJW2lOo50BREP1KZ5H7Uz5inPbly2pwMGsPgdE8OB5xohObbubRQoUsOWB7C3GPeV6qeCG</text><text x="17" y="431.12" fill="#000" font-size="14" textLength="702.017">TQ2c1VMZX6MelxHfz2T4DtpIw4ubvLi6hrbqIKam2WACM4iwzLrCiqmbM3bj4OD8NDc-MXX97Sp4e_h7</text><text x="17" y="447.417" fill="#000" font-size="14" textLength="687.688">782D9ZUKJodHl-HBLilbdhONkCWu2cSbi5_HLCnUBXco5mQy-Oje2ViaNpYOLg7C46u_csY6qx1