<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" data-diagram-type="CLASS" style="width:790px;height:539px;background:#FFFFFF;" width="790px" height="539px" viewBox="0 0 790 539" zoomAndPan="magnify" preserveAspectRatio="none" contentStyleType="text/css"><?plantuml 1.2026.7beta8?><defs/><g font-family="sans-serif" lengthAdjust="spacing"><g class="legend" data-source-line="1"><rect x="12" y="22" width="759.376" height="498.906" fill="#DDD" style="stroke:#000;stroke-width:1;" rx="7.5" ry="7.5"/><text x="17" y="39.995" fill="#000" font-size="14" textLength="399.301">The plugin you are using seems to generated a bad URL.</text><text x="17" y="56.292" fill="#000" font-size="14" textLength="295.887">This URL does not look like DEFLATE data.</text><text x="17" y="72.589" fill="#000" font-size="14" textLength="367.664">It looks like your plugin is using HUFFMAN encoding.</text><text x="17" y="88.886" fill="#000" font-size="14"> </text><text x="17" y="105.183" fill="#000" font-size="14" textLength="671.706">This means you have now to add an header ~1 to your data. For example, you have to change:</text><text x="17" y="121.479" fill="#000" font-size="14" textLength="533.463">http://www.plantuml.com/plantuml/png/eJyVVltrE0EUft9fMehLLVRatT4ULa...</text><text x="17" y="137.776" fill="#000" font-size="14" textLength="14.055">to</text><text x="17" y="154.073" fill="#000" font-size="14" textLength="554.101">http://www.plantuml.com/plantuml/png/~1eJyVVltrE0EUft9fMehLLVRatT4ULa...</text><text x="17" y="170.37" fill="#000" font-size="14"> </text><text x="17" y="186.667" fill="#000" font-size="14" textLength="138.277">It will work this way</text><text x="17" y="202.964" fill="#000" font-size="14" textLength="428.148">You may contact the PlantUML team at plantuml@gmail.com</text><text x="17" y="219.261" fill="#000" font-size="14" textLength="749.376">But you should also probably contact the plugin authors you are currently using and send them this image</text><text x="17" y="235.558" fill="#000" font-size="14"> </text><text x="17" y="251.854" fill="#000" font-size="14" textLength="232.545">For the record, here is your data:</text><text x="17" y="268.151" fill="#000" font-size="14"> </text><text x="17" y="284.448" fill="#000" font-size="14" textLength="653.639">eJyVVltrE0EUft9fMehLLVRatT4ULaY3DdZGahTflsnMSTJ2dybMzrZUIyjeBUWxah9VLBTE6JuKl1_j</text><text x="17" y="300.745" fill="#000" font-size="14" textLength="678.255">ts2_8MxecnHTlOYhTL4zZ853vnMh5wJDtQl9zwlWhGxQTX1SoWylplUo-azylCZHF-JPzw0OVRp6ZkFJ</text><text x="17" y="317.042" fill="#000" font-size="14" textLength="662.519">s0R9IAUtqDfYfkXcBDJxsseYvqwlaDIx7jggjTDr5MgcoN34-JO07223324fITQgnNxyCBklgpMpMlM8</text><text x="17" y="333.339" fill="#000" font-size="14" textLength="675.479">X1wqkzNnLl-cno5hacNPkWuF5dkLheWRifHxY4j7VNIaaLffacE63e4GnPcbnloHINHLzejbVhwOhoeD</text><text x="17" y="349.636" fill="#000" font-size="14" textLength="678.645">1CV5OYt6Ig6aIzMZww0aBGtKc7dOg3qv0-SkNfNO1oPYEoxIhZfPcBRl9GywjFGTNhparYJuUu4LiVdE</text><text x="17" y="365.933" fill="#000" font-size="14" textLength="664.651">4GaYfbdUWuxNvqv2TMhrkGne_nB_t_U2lqIyXIqDiI-SqggY9dx1oJYAGhGlUoaIVZKYmRcagoZ9ifrY</text><text x="17" y="382.229" fill="#000" font-size="14" textLength="707.896">HH14VaubIHOGnkyWQfiVUAcQt87O0632xp3o2es4Bz08B93r6kqVq-mwendsA8t-kDxGGdQhn-8owYk0</text><text x="17" y="398.526" fill="#000" font-size="14" textLength="709.502">YYAY17RqmqgLF7LW1LAqYM2e0qpyhG4AM8CtfGHFFzYFY6mU56_btyQAd1FYJmyo2It6A3qhT8GiAT9V</text><text x="17" y="414.823" fill="#000" font-size="14" textLength="692.296">cWfz-e7Ph4mQ4jBK7tMQjBqoKb2eEysvA4eAadEwQsm-23i9jzgDvER2t7Z3nrWiR5_3vtxN6LJhdAWm</text><text x="17" y="431.12" fill="#000" font-size="14" textLength="663.291">OJijkKtKMHCZ4vmSZkYZ-pV4pg5KInPg1ECufQLwPFxR_zXPiWS891VK-LjY3AY19f9lIeT4cfxSTLua</text><text x="17" y="447.417" fill="#000" font-size="14" textLength="688.898">rg3oLGthSlbjxBcWS4VysiR8xUVVAM8aAzNJ14bL6pY_GtC3GQagLbU6sBVXQ4ALHi12vTXXq