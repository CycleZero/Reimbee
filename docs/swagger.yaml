definitions:
  agent.GetMessagesResponse:
    properties:
      has_more:
        type: boolean
      messages:
        items:
          $ref: '#/definitions/agent.MessageItem'
        type: array
      next_cursor:
        description: 下一页游标，0 表示无更多
        type: integer
    type: object
  agent.ListSessionsResponse:
    properties:
      has_more:
        type: boolean
      next_cursor:
        description: 下一页游标，空表示无更多
        type: string
      sessions:
        items:
          $ref: '#/definitions/agent.SessionItem'
        type: array
    type: object
  agent.MessageItem:
    properties:
      content:
        type: string
      created_at:
        type: string
      role:
        type: string
      seq:
        type: integer
      tool_name:
        type: string
    type: object
  agent.SessionItem:
    properties:
      created_at:
        type: string
      message_count:
        type: integer
      session_id:
        type: string
      status:
        type: string
      summary:
        type: string
      updated_at:
        type: string
    type: object
  approval.ApprovalRecordResponse:
    properties:
      action:
        type: string
      action_at:
        type: string
      approver_email:
        type: string
      approver_name:
        type: string
      comment:
        type: string
      created_at:
        type: string
      id:
        type: integer
      reimbursement_id:
        type: integer
      updated_at:
        type: string
    type: object
  auth.LoginRequest:
    properties:
      employee_id:
        description: 工号
        type: string
      password:
        description: 密码
        type: string
    required:
    - employee_id
    - password
    type: object
  auth.LoginResponse:
    properties:
      employee_id:
        description: 工号
        type: string
      expires_in:
        description: 过期秒数
        type: integer
      name:
        description: 姓名
        type: string
      role:
        description: 角色
        type: string
      token:
        description: JWT Token
        type: string
    type: object
  auth.RegisterRequest:
    properties:
      department_id:
        description: 部门ID
        type: integer
      email:
        description: 邮箱（可选）
        type: string
      name:
        description: 姓名
        type: string
      password:
        description: 密码（至少6位）
        minLength: 6
        type: string
    required:
    - department_id
    - name
    - password
    type: object
  auth.RegisterResponse:
    properties:
      employee_id:
        description: 分配的工号
        type: string
      message:
        description: 提示信息
        type: string
      name:
        description: 姓名
        type: string
      role:
        description: 角色
        type: string
    type: object
  budget.BudgetResponse:
    properties:
      annual_budget:
        description: 年度预算(分)
        type: integer
      created_at:
        type: string
      department:
        type: string
      department_id:
        type: integer
      fiscal_year:
        type: integer
      frozen_amount:
        description: 已冻结(分)
        type: integer
      id:
        type: integer
      remaining:
        description: 可用余额(分)
        type: integer
      spent_amount:
        description: 已结算(分)
        type: integer
      updated_at:
        type: string
      usage_rate:
        description: 使用率百分比
        type: number
    type: object
  budget.CreateBudgetRequest:
    properties:
      annual_budget:
        description: 年度预算(分)
        type: integer
      department_id:
        description: 部门ID
        type: integer
      fiscal_year:
        description: 财年
        type: integer
    required:
    - annual_budget
    - department_id
    - fiscal_year
    type: object
  budget.DashboardResponse:
    properties:
      departments:
        items:
          $ref: '#/definitions/budget.BudgetResponse'
        type: array
      summary:
        $ref: '#/definitions/budget.DashboardSummary'
    type: object
  budget.DashboardSummary:
    properties:
      overall_usage:
        description: 总体使用率
        type: number
      total_budget:
        description: 总预算(分)
        type: integer
      total_remaining:
        description: 总剩余(分)
        type: integer
      total_spent:
        description: 总已结算(分)
        type: integer
    type: object
  budget.UpdateBudgetRequest:
    properties:
      annual_budget:
        description: 年度预算(分)
        type: integer
    required:
    - annual_budget
    type: object
  department.CreateDepartmentRequest:
    properties:
      manager_id:
        description: 部门主管员工ID，可选
        type: integer
      name:
        description: 部门名称
        type: string
    required:
    - name
    type: object
  department.DepartmentResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      manager_id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  department.ListDepartmentResponse:
    properties:
      list:
        items:
          $ref: '#/definitions/department.DepartmentResponse'
        type: array
      page:
        type: integer
      total:
        type: integer
    type: object
  department.UpdateDepartmentRequest:
    properties:
      manager_id:
        description: 部门主管员工ID，可选
        type: integer
      name:
        description: 新部门名称
        type: string
    required:
    - name
    type: object
  employee.CreateEmployeeRequest:
    properties:
      department_id:
        description: 所属部门ID
        type: integer
      email:
        description: 邮箱
        type: string
      employee_id:
        description: 工号
        type: string
      name:
        description: 姓名
        type: string
      role:
        description: 角色，默认 employee
        type: string
    required:
    - department_id
    - employee_id
    - name
    type: object
  employee.EmployeeResponse:
    properties:
      created_at:
        type: string
      department:
        description: 部门名称
        type: string
      department_id:
        type: integer
      email:
        type: string
      employee_id:
        type: string
      id:
        type: integer
      is_approver:
        type: boolean
      name:
        type: string
      role:
        type: string
      updated_at:
        type: string
    type: object
  employee.ListEmployeeResponse:
    properties:
      list:
        items:
          $ref: '#/definitions/employee.EmployeeResponse'
        type: array
      page:
        type: integer
      total:
        type: integer
    type: object
  employee.UpdateEmployeeRequest:
    properties:
      department_id:
        description: 所属部门ID
        type: integer
      email:
        description: 邮箱
        type: string
      name:
        description: 姓名
        type: string
      role:
        description: 角色
        type: string
    required:
    - department_id
    - name
    type: object
  reimbursement.ApprovalInfoResponse:
    properties:
      action:
        type: string
      action_at:
        type: string
      approver_name:
        type: string
      comment:
        type: string
      id:
        type: integer
    type: object
  reimbursement.CreateReimbursementRequest:
    properties:
      department_id:
        description: 部门ID
        type: integer
      employee_id:
        description: 工号
        type: string
      employee_name:
        description: 申请人姓名
        type: string
      submit_note:
        description: 报销事由
        type: string
    required:
    - department_id
    - employee_id
    - employee_name
    type: object
  reimbursement.InvoiceItemResponse:
    properties:
      amount:
        type: integer
      category:
        type: string
      check_result:
        type: string
      id:
        type: integer
      invoice_date:
        type: string
    type: object
  reimbursement.ListReimbursementResponse:
    properties:
      list:
        items:
          $ref: '#/definitions/reimbursement.ReimbursementResponse'
        type: array
      page:
        type: integer
      total:
        type: integer
    type: object
  reimbursement.ReimbursementResponse:
    properties:
      approvals:
        items:
          $ref: '#/definitions/reimbursement.ApprovalInfoResponse'
        type: array
      created_at:
        type: string
      department:
        type: string
      department_id:
        type: integer
      employee_id:
        type: string
      employee_name:
        type: string
      id:
        type: integer
      invoices:
        items:
          $ref: '#/definitions/reimbursement.InvoiceItemResponse'
        type: array
      need_special_approval:
        type: boolean
      reimbursement_no:
        type: string
      status:
        type: string
      submit_note:
        type: string
      total_amount:
        type: integer
      updated_at:
        type: string
    type: object
  reimbursement.SubmitReimbursementRequest:
    properties:
      total_amount:
        description: 报销总金额(分)
        type: integer
    required:
    - total_amount
    type: object
  reimbursement.UploadInvoiceResponse:
    properties:
      file_id:
        description: 文件唯一标识（UUID）
        type: string
      file_name:
        description: 原始文件名
        type: string
      file_path:
        description: 存储路径（供 Agent OCR 工具使用）
        type: string
      size:
        description: 文件大小（字节）
        type: integer
      url:
        description: 可访问 URL（用于前端预览）
        type: string
    type: object
info:
  contact: {}
paths:
  /api/approvals/{id}/approve:
    post:
      consumes:
      - application/json
      description: 审批人对指定审批记录进行通过操作，可附带审批意见
      parameters:
      - description: 审批记录ID
        in: path
        name: id
        required: true
        type: integer
      - description: 审批请求体，comment字段为可选审批意见
        in: body
        name: request
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 审批已通过
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 审批记录ID格式错误
          schema:
            additionalProperties: true
            type: object
        "409":
          description: 审批操作失败
          schema:
            additionalProperties: true
            type: object
      summary: 审批通过
      tags:
      - 审批管理
  /api/approvals/{id}/reject:
    post:
      consumes:
      - application/json
      description: 审批人对指定审批记录进行驳回操作，必须提供驳回原因
      parameters:
      - description: 审批记录ID
        in: path
        name: id
        required: true
        type: integer
      - description: 驳回请求体，reason字段必填
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 审批已驳回
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误或驳回原因不能为空
          schema:
            additionalProperties: true
            type: object
        "409":
          description: 驳回操作失败
          schema:
            additionalProperties: true
            type: object
      summary: 驳回审批
      tags:
      - 审批管理
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: 验证工号和密码，返回 JWT Token
      parameters:
      - description: 登录请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功，返回 JWT
          schema:
            $ref: '#/definitions/auth.LoginResponse'
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 工号或密码错误
          schema:
            additionalProperties: true
            type: object
      summary: 用户登录
      tags:
      - 认证
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: 注册新用户，工号自动分配（EMP001起），密码 bcrypt 加密
      parameters:
      - description: 注册请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: 注册成功，返回分配的工号
          schema:
            $ref: '#/definitions/auth.RegisterResponse'
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "409":
          description: 工号已存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器内部错误
          schema:
            additionalProperties: true
            type: object
      summary: 用户注册
      tags:
      - 认证
  /api/budgets:
    post:
      consumes:
      - application/json
      description: 管理员为指定部门创建财年预算
      parameters:
      - description: 创建预算请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/budget.CreateBudgetRequest'
      produces:
      - application/json
      responses:
        "201":
          description: 预算创建成功
          schema:
            $ref: '#/definitions/budget.BudgetResponse'
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "409":
          description: 该部门该财年预算已存在
          schema:
            additionalProperties: true
            type: object
      summary: 创建预算记录
      tags:
      - 预算管理
  /api/budgets/{id}:
    get:
      consumes:
      - application/json
      description: 根据预算ID获取单条预算记录
      parameters:
      - description: 预算ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 预算详情
          schema:
            $ref: '#/definitions/budget.BudgetResponse'
        "400":
          description: 预算ID格式错误
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 预算记录不存在
          schema:
            additionalProperties: true
            type: object
      summary: 获取预算详情
      tags:
      - 预算管理
    put:
      consumes:
      - application/json
      description: 管理员更新指定预算记录的年度预算金额
      parameters:
      - description: 预算ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新预算请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/budget.UpdateBudgetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 预算更新成功
          schema:
            $ref: '#/definitions/budget.BudgetResponse'
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "409":
          description: 预算更新失败
          schema:
            additionalProperties: true
            type: object
      summary: 更新预算金额
      tags:
      - 预算管理
  /api/budgets/dashboard:
    get:
      consumes:
      - application/json
      description: 获取指定财年所有部门的预算概览，包含汇总统计
      parameters:
      - description: 财年，默认2026
        in: query
        name: year
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 预算看板数据
          schema:
            $ref: '#/definitions/budget.DashboardResponse'
        "500":
          description: 服务器内部错误
          schema:
            additionalProperties: true
            type: object
      summary: 获取预算看板
      tags:
      - 预算管理
  /api/chat/sessions:
    get:
      consumes:
      - application/json
      description: 游标分页查询当前用户的会话历史，按更新时间倒序
      parameters:
      - description: 游标（上一页最后一条的 updated_at，首次传空）
        in: query
        name: cursor
        type: string
      - description: 每页数量，默认20，最大50
        in: query
        name: limit
        type: integer
      - description: Bearer JWT Token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 会话列表
          schema:
            $ref: '#/definitions/agent.ListSessionsResponse'
        "500":
          description: 查询失败
          schema:
            additionalProperties: true
            type: object
      summary: 获取会话列表
      tags:
      - Agent对话
  /api/chat/sessions/{id}/messages:
    get:
      consumes:
      - application/json
      description: 游标分页加载指定会话的消息记录，按 seq 正序
      parameters:
      - description: 会话ID
        in: path
        name: id
        required: true
        type: string
      - description: 游标（上次拉取的最后一条消息 seq，首次传0）
        in: query
        name: cursor
        type: integer
      - description: 每页数量，默认20，最大100
        in: query
        name: limit
        type: integer
      - description: Bearer JWT Token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 消息列表
          schema:
            $ref: '#/definitions/agent.GetMessagesResponse'
        "500":
          description: 查询失败
          schema:
            additionalProperties: true
            type: object
      summary: 获取会话消息历史
      tags:
      - Agent对话
  /api/chat/stream:
    get:
      consumes:
      - application/json
      description: |-
        通过 Server-Sent Events 与报销智能助手进行实时对话。
        支持多轮对话上下文，自动识别票据、合规审核、预算检查、提交报销。

        SSE 事件类型：
        - thinking:    LLM 思考中
        - reasoning:   LLM 推理过程（DeepSeek-R1 等模型）
        - message:     LLM 文本输出（delta=true 为流式增量，false 为完整消息）
        - tool_call:   工具调用开始（工具名 + 输入参数）
        - tool_result: 工具调用结果（工具名 + 输出）
        - interrupted: 等待审批确认
        - error:       错误
        - done:        本轮对话完成

        同一 sessionID 的多次请求共享对话上下文和报销流程状态。
      parameters:
      - description: 会话ID（UUID），同一会话多次请求复用此ID
        in: query
        name: session_id
        required: true
        type: string
      - description: 用户消息内容，支持自然语言（中文）
        in: query
        name: message
        required: true
        type: string
      - description: Bearer JWT Token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE 事件流（text/event-stream）
          schema:
            type: string
        "400":
          description: 缺少必填参数（session_id 或 message）
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未认证（JWT 无效或过期）
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器不支持流式响应
          schema:
            additionalProperties: true
            type: object
      summary: Agent 流式对话（SSE）
      tags:
      - Agent对话
  /api/departments:
    get:
      consumes:
      - application/json
      description: 分页查询所有部门，返回部门列表及总数
      parameters:
      - description: 页码，默认1
        in: query
        name: page
        type: integer
      - description: 每页数量，默认10
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 部门列表
          schema:
            $ref: '#/definitions/department.ListDepartmentResponse'
        "500":
          description: 服务器内部错误
          schema:
            additionalProperties: true
            type: object
      summary: 获取部门列表
      tags:
      - 部门管理
    post:
      consumes:
      - application/json
      description: 管理员创建新部门，部门名称必须唯一
      parameters:
      - description: 创建部门请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/department.CreateDepartmentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: 部门创建成功
          schema:
            $ref: '#/definitions/department.DepartmentResponse'
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "409":
          description: 部门名称已存在
          schema:
            additionalProperties: true
            type: object
      summary: 创建新部门
      tags:
      - 部门管理
  /api/departments/{id}:
    delete:
      consumes:
      - application/json
      description: 管理员删除指定部门（如有员工归属则不可删除）
      parameters:
      - description: 部门ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 部门删除成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 部门ID格式错误
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 部门不存在
          schema:
            additionalProperties: true
            type: object
        "409":
          description: 部门下存在关联数据，无法删除
          schema:
            additionalProperties: true
            type: object
      summary: 删除部门
      tags:
      - 部门管理
    get:
      consumes:
      - application/json
      description: 根据部门ID获取单个部门的详细信息
      parameters:
      - description: 部门ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 部门详情
          schema:
            $ref: '#/definitions/department.DepartmentResponse'
        "400":
          description: 部门ID格式错误
          schema:
            additionalProperties: true
            type: object
        "404":
